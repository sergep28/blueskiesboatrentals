databases:
  - name: blueskies-db
    plan: free
    databaseName: blueskies
    user: blueskies

services:
  - type: web
    name: blueskiesboatrentals
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: blueskies-db
          property: connectionString
